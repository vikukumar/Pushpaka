name: Publish Helm Chart to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'helm/**'
      - 'VERSION'
      - '.github/workflows/helm-release.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint Helm Chart
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: '3.12.0'

      - name: Build chart dependencies
        run: helm dependency build helm/pushpaka

      - name: Lint Helm chart
        run: helm lint helm/pushpaka

  package:
    runs-on: ubuntu-latest
    name: Package Helm Chart
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: '3.12.0'

      - name: Build chart dependencies
        run: helm dependency build helm/pushpaka

      - name: Read VERSION file
        id: version
        run: |
          VERSION=$(cat VERSION)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"

      - name: Update Chart version
        run: |
          VERSION=$(cat VERSION)
          sed -i "s/^version: .*/version: ${VERSION}/" helm/pushpaka/Chart.yaml
          sed -i "s/^appVersion: .*/appVersion: ${VERSION}/" helm/pushpaka/Chart.yaml

      - name: Package Helm chart
        run: |
          mkdir -p helm-releases
          helm package helm/pushpaka -d helm-releases/
          ls -la helm-releases/

      - name: Upload chart artifact
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: helm-releases/

  publish:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    name: Publish to GitHub Pages
    needs: package
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download chart artifact
        uses: actions/download-artifact@v4
        with:
          name: helm-chart
          path: helm-releases/

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Create/Update Helm index
        run: |
          mkdir -p helm-repo
          cp helm-releases/*.tgz helm-repo/ 2>/dev/null || true
          
          # Create index if it doesn't exist
          if [ ! -f helm-repo/index.yaml ]; then
            helm repo index helm-repo/ --url https://vikukumar.github.io/Pushpaka/helm
          else
            helm repo index helm-repo/ --url https://vikukumar.github.io/Pushpaka/helm --merge helm-repo/index.yaml
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./helm-repo
          destination_dir: helm

  notify:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    name: Notify Release
    needs: publish
    steps:
      - name: Read VERSION
        id: version
        run: |
          VERSION=$(cat VERSION | head -1)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release (if not exists)
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.version.outputs.version }}
          release_name: Helm Chart v${{ steps.version.outputs.version }}
          body: |
            ## Helm Chart v${{ steps.version.outputs.version }}
            
            This release includes the Pushpaka Helm chart for Kubernetes deployment.
            
            ### Quick Start
            
            ```bash
            helm repo add pushpaka https://vikukumar.github.io/Pushpaka/helm
            helm repo update
            helm install pushpaka pushpaka/pushpaka -n pushpaka --create-namespace
            ```
            
            ### Documentation
            - [Helm Installation](https://vikukumar.github.io/Pushpaka/helm-install)
            - [Values Configuration](https://github.com/vikukumar/Pushpaka/blob/main/helm/pushpaka/values.yaml)
            - [Release Notes](https://vikukumar.github.io/Pushpaka/releases)
          draft: false
          prerelease: false
        continue-on-error: true
