<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E1B4B"/>
    </linearGradient>
    <linearGradient id="cloudG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    <linearGradient id="wingG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06B6D4"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Grid pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1E293B" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.5"/>

  <!-- Glowing orb -->
  <circle cx="600" cy="315" r="280" fill="#6366F1" opacity="0.03"/>
  <circle cx="600" cy="315" r="200" fill="#8B5CF6" opacity="0.04"/>

  <!-- Logo Mark (Pushpaka Vimana) - centered large -->
  <g transform="translate(480, 160) scale(2.8)">
    <!-- Cloud body -->
    <rect x="12" y="28" width="52" height="18" rx="9" fill="url(#cloudG)" filter="url(#glow2)"/>
    <circle cx="24" cy="28" r="8" fill="url(#cloudG)" filter="url(#glow2)"/>
    <circle cx="38" cy="24" r="10" fill="url(#cloudG)" filter="url(#glow2)"/>
    <circle cx="52" cy="27" r="8" fill="url(#cloudG)" filter="url(#glow2)"/>
    <!-- Wings -->
    <path d="M14 40 Q2 36 4 44 Q2 50 14 46" fill="url(#wingG)" opacity="0.9"/>
    <path d="M62 40 Q74 36 72 44 Q74 50 62 46" fill="url(#wingG)" opacity="0.9"/>
    <!-- Deck -->
    <rect x="26" y="18" width="24" height="7" rx="3.5" fill="#C4B5FD" opacity="0.9"/>
    <!-- Spire -->
    <line x1="38" y1="11" x2="38" y2="18" stroke="#E0D6FF" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="38" cy="10" r="2" fill="#06B6D4" filter="url(#glow2)"/>
  </g>

  <!-- Wordmark -->
  <text x="600" y="420" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-weight="800" font-size="80" fill="#E0E7FF" text-anchor="middle" letter-spacing="-2">Pushpaka</text>

  <!-- Tagline -->
  <text x="600" y="475" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-weight="400" font-size="24" fill="#94A3B8" text-anchor="middle" letter-spacing="0.5">Carry your code to the cloud effortlessly.</text>

  <!-- Bottom badge -->
  <rect x="520" y="510" width="160" height="36" rx="18" fill="#6366F1" opacity="0.2" stroke="#6366F1" stroke-width="1" stroke-opacity="0.4"/>
  <text x="600" y="533" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-weight="600" font-size="14" fill="#A5B4FC" text-anchor="middle" letter-spacing="2">v1.0.0 · Self-Hosted</text>
</svg>
